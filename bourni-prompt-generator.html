<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOURNI iA PROMPT GENERATOR</title>
  <style>
    :root {
      --primary: #ff00ff;
      --primary-dark: #cc00cc;
      --secondary: #00ff88;
      --bg-dark: #1e1e2f;
      --bg-darker: #1a1a2e;
      --bg-card: rgba(0, 0, 0, 0.7);
      --text: #ffffff;
      --text-secondary: #b0b0b0;
      --border-radius: 12px;
      --transition: all 0.3s ease;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 15px 30px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg-dark), #2a2a45);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--bg-card);
      padding: 30px;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.5s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      color: var(--primary);
      text-shadow: 0 0 20px var(--primary);
      margin-bottom: 30px;
      font-size: 2.5em;
      font-weight: 700;
      letter-spacing: 1px;
      position: relative;
    }

    h1::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), transparent);
      border-radius: 2px;
    }

    label {
      display: block;
      margin: 15px 0 8px;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.95em;
    }

    input[type="text"],
    input[type="range"],
    select,
    textarea {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #2a2a3e;
      color: white;
      font-size: 1em;
      transition: var(--transition);
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 0, 255, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .row select,
    .row input {
      flex: 1;
      min-width: 180px;
    }

    .checkbox-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      cursor: pointer;
      font-size: 0.95em;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      accent-color: var(--primary);
      transform: scale(1.1);
    }

    .buttons-container {
      display: flex;
      gap: 10px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    button {
      padding: 15px 30px;
      font-size: 1em;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    button:active {
      transform: translateY(0);
    }

    .generate-btn {
      background: linear-gradient(45deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .copy-btn {
      background: var(--secondary);
      color: black;
    }

    .copy-btn.copied {
      background: #4CAF50;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .result {
      margin-top: 25px;
      padding: 20px;
      background: var(--bg-darker);
      border-radius: 10px;
      white-space: pre-wrap;
      font-size: 0.95em;
      line-height: 1.8;
      border-left: 4px solid var(--primary);
      animation: fadeIn 0.5s ease;
      max-height: 500px;
      overflow-y: auto;
      position: relative;
    }

    .result::-webkit-scrollbar {
      width: 8px;
    }

    .result::-webkit-scrollbar-track {
      background: #2a2a3e;
      border-radius: 4px;
    }

    .result::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    .result::-webkit-scrollbar-thumb:hover {
      background: var(--primary-dark);
    }

    .result::before {
      content: "🎵 PROMPT GÉNÉRÉ";
      position: absolute;
      top: -12px;
      left: 20px;
      background: var(--bg-darker);
      padding: 0 10px;
      font-size: 0.8em;
      color: var(--primary);
      border-radius: 4px;
    }

    .duration-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .duration-value {
      color: var(--primary);
      font-weight: bold;
      min-width: 100px;
    }

    input[type="range"] {
      width: auto;
      flex: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.8em;
      }

      .buttons-container {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .checkbox-group {
        flex-direction: column;
        gap: 10px;
      }

      .row {
        flex-direction: column;
      }
    }

    /* Effet de glow pour les boutons */
    .generate-btn {
      box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
    }

    .copy-btn {
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }

    /* Style pour les emojis dans le résultat */
    .result em {
      font-style: normal;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>BOURNI iA PROMPT GENERATOR</h1>

    <div class="row">
      <div style="flex: 2;">
        <label>Titre de la chanson</label>
        <input type="text" id="songTitle" placeholder="ex: À la fin de l'été">
      </div>
    </div>

    <label>Langue des paroles</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="langFR" checked> Français</label>
      <label><input type="checkbox" id="langEN"> Anglais</label>
      <label><input type="checkbox" id="langES"> Espagnol</label>
    </div>

    <label>Chanteur 1 (voix principale)</label>
    <input type="text" id="singer1" placeholder="ex: Jimmy Somerville" onblur="correctName(this)">

    <label>Chanteur 2 (duo - optionnel)</label>
    <input type="text" id="singer2" placeholder="ex: Céline Dion" onblur="correctName(this)">

    <label>Époque / Année</label>
    <select id="era">
      <option value="">Aucune époque particulière</option>
      <option value="50's">50's</option>
      <option value="60's">60's</option>
      <option value="70's">70's</option>
      <option value="80's">80's</option>
      <option value="90's">90's</option>
      <option value="2000's">2000's</option>
      <option value="2010's">2010's</option>
      <option value="2020's">2020's</option>
      <option value="futuriste">Futuriste</option>
    </select>

    <label>Cible Radio</label>
    <select id="radioTarget">
      <option value="">Aucune cible particulière</option>
      <option value="NRJ">NRJ</option>
      <option value="Chérie FM">Chérie FM</option>
      <option value="Nostalgie">Nostalgie</option>
      <option value="FG">FG</option>
      <option value="RTL2">RTL2</option>
    </select>

    <label>Styles Musicaux (5 maximum)</label>
    <div class="row" id="styleRow"></div>

    <label>Architecture de la chanson</label>
    <div class="row" id="structureRow"></div>

    <label>Ambiance / Mood</label>
    <select id="mood">
      <option value="très romantique et sensuel">Très Romantique & Sensuel</option>
      <option value="joyeux et entraînant">Joyeux & Entraînant</option>
      <option value="mélancolique et émouvant">Mélancolique & Émouvant</option>
      <option value="énergique">Énergique</option>
      <option value="nostalgique">Nostalgique</option>
    </select>

    <label>Style des paroles / style de la musique</label>
    <input type="text" id="lyricsStyle" placeholder="ex: à la manière de Jean-Jacques Goldman...">

    <label>Ad Libs</label>
    <div class="checkbox-group" style="gap: 5px;">
      <input type="checkbox" id="adlib">
      <label for="adlib" style="display: inline;">Autoriser les ad-libs</label>
    </div>

    <label>Paroles (optionnel)</label>
    <textarea id="lyrics" placeholder="Colle tes paroles ici si tu veux les imposer..."></textarea>
    <div class="checkbox-group" style="gap: 5px; margin-top: 5px;">
      <input type="checkbox" id="autolyrics" checked>
      <label for="autolyrics" style="display: inline;">Laisser l'IA écrire les paroles</label>
    </div>

    <label>Durée approximative</label>
    <div class="duration-container">
      <input type="range" id="duration" min="2" max="4.5" value="3" step="0.5">
      <span class="duration-value" id="durationValue">3 minutes</span>
    </div>

    <div class="buttons-container">
      <button class="generate-btn" onclick="generatePrompt()">🚀 GÉNÉRER LE PROMPT</button>
      <button class="copy-btn" onclick="copyPrompt()">📋 COPIER LE PROMPT</button>
    </div>

    <div class="result" id="result"></div>
  </div>

  <script>
    // Liste des corrections d'artistes
    const artistCorrections = {
      "celine dion": "Céline Dion",
      "jean jacques goldman": "Jean-Jacques Goldman",
      "renaud": "Renaud",
      "julio iglesias": "Julio Iglesias",
      "jimmy somerville": "Jimmy Somerville",
      "modern talin": "Modern Talking",
      "modern talking": "Modern Talking",
      "mylene farmer": "Mylène Farmer",
      "eddy mitchell": "Eddie Mitchell",
      "eddie mitchel": "Eddie Mitchell",
      "charles aznavour": "Charles Aznavour",
      "francis cabrel": "Francis Cabrel",
      "johnny hallyday": "Johnny Hallyday",
      "patricia kaas": "Patricia Kaas",
      "veronique sanson": "Véronique Sanson",
      "alain bashung": "Alain Bashung",
      "indochine": "Indochine",
      "calogero": "Calogero",
      "jean-jacques goldman": "Jean-Jacques Goldman"
    };

    // Liste des styles musicaux
    const musicStyles = [
      "pop", "rock", "rap", "electronic", "latin", "dance", "french pop", "chanson",
      "indie pop", "r&b", "soul", "funk", "reggae", "electro", "synthpop", "dream pop",
      "indie", "acoustic", "electropop", "chill", "trap", "house", "ambient", "dance pop",
      "soft rock", "progressive", "emo", "latin pop", "bossa nova", "disco", "new wave",
      "vaporwave", "hyperpop", "lo-fi hip hop", "phonk", "retrowave"
    ];

    // Liste des options de structure
    const structureOptions = [
      "intro", "instrumental", "drop", "pré-hook", "pré-chorus", "verse", "hook",
      "chorus", "post-chorus", "bridge", "break", "outro", "end", "non indiqué"
    ];

    // Initialisation au chargement de la page
    document.addEventListener('DOMContentLoaded', function() {
      // Initialiser les sélecteurs de styles
      const styleRow = document.getElementById('styleRow');
      for (let i = 0; i < 5; i++) {
        const select = document.createElement('select');
        select.innerHTML = `<option value="">Style ${i+1}</option>` +
          musicStyles.map(s => `<option value="${s}">${s}</option>`).join('');
        styleRow.appendChild(select);
      }

      // Initialiser les sélecteurs de structure
      const structRow = document.getElementById('structureRow');
      const defaults = ["intro", "verse", "chorus", "verse", "chorus", "outro"];
      for (let i = 0; i < 6; i++) {
        const select = document.createElement('select');
        structureOptions.forEach(opt => {
          const option = document.createElement('option');
          option.value = opt;
          option.textContent = opt;
          if (opt === defaults[i]) option.selected = true;
          select.appendChild(option);
        });
        structRow.appendChild(select);
      }

      // Charger les paramètres sauvegardés
      loadParameters();

      // Écouteur pour la durée
      document.getElementById('duration').addEventListener('input', function() {
        document.getElementById('durationValue').textContent = this.value + " minutes";
        saveParameters();
      });

      // Sauvegarder automatiquement lors des changements
      document.querySelectorAll('input, select, textarea').forEach(el => {
        el.addEventListener('change', saveParameters);
        el.addEventListener('input', saveParameters);
      });
    });

    // Fonction pour corriger les noms d'artistes
    function correctName(input) {
      const value = input.value.toLowerCase().trim();
      if (artistCorrections[value]) {
        input.value = artistCorrections[value];
        saveParameters();
      }
    }

    // Fonction pour sauvegarder les paramètres
    function saveParameters() {
      const params = {
        songTitle: document.getElementById('songTitle').value,
        singer1: document.getElementById('singer1').value,
        singer2: document.getElementById('singer2').value,
        era: document.getElementById('era').value,
        radioTarget: document.getElementById('radioTarget').value,
        mood: document.getElementById('mood').value,
        lyricsStyle: document.getElementById('lyricsStyle').value,
        lyrics: document.getElementById('lyrics').value,
        autolyrics: document.getElementById('autolyrics').checked,
        adlib: document.getElementById('adlib').checked,
        duration: document.getElementById('duration').value,
        langFR: document.getElementById('langFR').checked,
        langEN: document.getElementById('langEN').checked,
        langES: document.getElementById('langES').checked,
        styles: Array.from(document.querySelectorAll('#styleRow select')).map(s => s.value),
        structure: Array.from(document.querySelectorAll('#structureRow select')).map(s => s.value)
      };
      localStorage.setItem('promptGeneratorParams', JSON.stringify(params));
    }

    // Fonction pour charger les paramètres
    function loadParameters() {
      const saved = localStorage.getItem('promptGeneratorParams');
      if (saved) {
        try {
          const params = JSON.parse(saved);
          document.getElementById('songTitle').value = params.songTitle || '';
          document.getElementById('singer1').value = params.singer1 || '';
          document.getElementById('singer2').value = params.singer2 || '';
          document.getElementById('era').value = params.era || '';
          document.getElementById('radioTarget').value = params.radioTarget || '';
          document.getElementById('mood').value = params.mood || '';
          document.getElementById('lyricsStyle').value = params.lyricsStyle || '';
          document.getElementById('lyrics').value = params.lyrics || '';
          document.getElementById('autolyrics').checked = params.autolyrics !== false;
          document.getElementById('adlib').checked = params.adlib !== false;
          document.getElementById('duration').value = params.duration || 3;
          document.getElementById('langFR').checked = params.langFR !== false;
          document.getElementById('langEN').checked = params.langEN !== false;
          document.getElementById('langES').checked = params.langES !== false;

          // Charger les styles
          if (params.styles) {
            document.querySelectorAll('#styleRow select').forEach((s, i) => {
              s.value = params.styles[i] || '';
            });
          }

          // Charger la structure
          if (params.structure) {
            document.querySelectorAll('#structureRow select').forEach((s, i) => {
              s.value = params.structure[i] || '';
            });
          }

          // Mettre à jour l'affichage de la durée
          document.getElementById('durationValue').textContent = (params.duration || 3) + " minutes";
        } catch (e) {
          console.error("Erreur de chargement des paramètres:", e);
        }
      }
    }

    // Fonction pour générer le prompt
    function generatePrompt() {
      const title = document.getElementById('songTitle').value.trim();
      let singer1 = document.getElementById('singer1').value.trim() || "un artiste";
      let singer2 = document.getElementById('singer2').value.trim();
      const era = document.getElementById('era').value;
      const radio = document.getElementById('radioTarget').value;
      const mood = document.getElementById('mood').value;
      const lyricsStyle = document.getElementById('lyricsStyle').value;
      const lyrics = document.getElementById('lyrics').value.trim();
      const autolyrics = document.getElementById('autolyrics').checked;
      const adlib = document.getElementById('adlib').checked;
      const duration = document.getElementById('duration').value;

      // Correction des noms d'artistes
      singer1 = artistCorrections[singer1.toLowerCase()] || singer1;
      if (singer2) singer2 = artistCorrections[singer2.toLowerCase()] || singer2;

      // Langues
      let languages = [];
      if (document.getElementById('langFR').checked) languages.push("français");
      if (document.getElementById('langEN').checked) languages.push("anglais");
      if (document.getElementById('langES').checked) languages.push("espagnol");
      let langText = languages.length > 1 ? `Mix ${languages.join(" / ")}` : (languages[0] || "français");

      // Styles
      let styles = [];
      document.querySelectorAll('#styleRow select').forEach(s => { if (s.value) styles.push(s.value); });

      // Structure
      let structure = [];
      document.querySelectorAll('#structureRow select').forEach(s => { if (s.value) structure.push(s.value); });

      // Construction du prompt
      let prompt = `CRÉE UN VRAI TUBE ULTRA-MÉMORISABLE ET FREDONNABLE.\n\n`;

      // NOUVELLE PARTIE POUR LES DUOS (optimisée pour Treblo.com)
      if (singer2) {
        prompt += `TAGS OBLIGATOIRE : ${singer1}, ${singer2}, Duet\n`;
        prompt += `=== ⚠️ VOICE SEPARATION RULES (MANDATORY) ===\n`;
        prompt += `This is a DUET. The AI MUST generate TWO DISTINCT VOCAL TRACKS.\n`;
        prompt += `✅ ${singer1} sings ALONE in: Verse 1, Verse 3, Bridge\n`;
        prompt += `✅ ${singer2} sings ALONE in: Verse 2, Verse 4, Pre-Chorus\n`;
        prompt += `✅ BOTH sing TOGETHER ONLY in: Chorus, Outro\n`;
        prompt += `❌ NEVER merge voices in the same phrase, word, or syllable.\n`;
        prompt += `❌ NEVER use a single vocal track for both artists.\n`;
        prompt += `🔊 Use STEREO PANNING: ${singer1} on LEFT channel, ${singer2} on RIGHT channel for solo parts.\n`;
        prompt += `🎛️ Mix both tracks ONLY during chorus, with ${singer1} 30% left and ${singer2} 30% right.\n\n`;
      } else {
        prompt += `TAGS OBLIGATOIRE : ${singer1}\n`;
      }

      prompt += `Respecte STRICTEMENT les tags obligatoires ci-dessus.\n\n`;

      if (title) prompt += `Titre : "${title}"\n`;
      prompt += `Langue : ${langText}\n`;
      if (era) prompt += `Époque : ${era}\n`;
      if (radio) prompt += `Cible radio : ${radio}\n`;
      if (styles.length) prompt += `Styles : ${styles.join(", ")}\n`;
      prompt += `Ambiance : ${mood}\n`;
      prompt += `Structure : ${structure.join(" - ")}\n\n`;

      if (lyricsStyle) prompt += `Style des paroles : ${lyricsStyle}\n`;
      if (autolyrics) prompt += `Écris des paroles complètes, percutantes et faciles à retenir.\n`;
      if (lyrics) prompt += `Paroles à utiliser : ${lyrics}\n`;
      if (adlib) prompt += `Ajoute des ad-libs naturels entre parenthèses.\n\n`;

      prompt += `Mélodie extrêmement catchy avec un refrain puissant qui reste en tête dès la première écoute. Production professionnelle, mix radio puissant.`;

      // Afficher le résultat
      document.getElementById('result').textContent = prompt;
      saveParameters(); // Sauvegarder après génération
    }

    // Fonction pour copier le prompt avec feedback visuel
    function copyPrompt() {
      const resultDiv = document.getElementById('result');
      const text = resultDiv.textContent;

      if (!text) {
        alert("⚠️ Génère d'abord un prompt !");
        return;
      }

      // Copier dans le presse-papiers
      navigator.clipboard.writeText(text)
        .then(() => {
          const copyBtn = document.querySelector('.copy-btn');
          const originalText = copyBtn.innerHTML;
          copyBtn.innerHTML = "✅ COPIÉ !";
          copyBtn.classList.add('copied');

          setTimeout(() => {
            copyBtn.innerHTML = originalText;
            copyBtn.classList.remove('copied');
          }, 2000);
        })
        .catch(() => {
          // Fallback pour les anciens navigateurs
          const textarea = document.createElement('textarea');
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          alert("✅ Prompt copié dans le presse-papiers !");
        });
    }
  </script>
</body>
</html>
