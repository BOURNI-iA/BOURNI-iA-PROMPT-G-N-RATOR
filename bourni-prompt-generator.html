<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOURNI iA PROMPT GÉNÉRATOR</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2a2a45);
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    h1 { text-align: center; color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
    .container { max-width: 950px; margin: 0 auto; background: rgba(0,0,0,0.7); padding: 30px; border-radius: 15px; }
    label { display: block; margin: 15px 0 6px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; }
    button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    }
    .generate-btn { background: #ff00ff; color: white; }
    .copy-btn { background: #00ff88; color: black; }
    .result { margin-top: 25px; padding: 18px; background: #1a1a2e; border-radius: 10px; white-space: pre-wrap; font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>BOURNI iA PROMPT GÉNÉRATOR</h1>
    <p style="text-align:center; color:#ccc;">Générateur de prompts optimisés pour IA musicale</p>

    <label>Chanteur 1 (voix principale)</label>
    <input type="text" id="singer1" placeholder="ex: Renaud, Julio Iglesias">

    <label>Chanteur 2 (duo - optionnel)</label>
    <input type="text" id="singer2" placeholder="ex: Céline Dion">

    <label>Cible Radio (style visé)</label>
    <select id="radioTarget">
      <option value="">Aucune cible particulière</option>
      <option value="NRJ">NRJ (pop moderne, hits actuels)</option>
      <option value="Chérie FM">Chérie FM (romantique, love songs)</option>
      <option value="Nostalgie">Nostalgie (classique, années 70-90)</option>
      <option value="FG">FG (électro, deep house, moderne pointu)</option>
      <option value="RTL2">RTL2 (pop rock, indie, feel-good)</option>
      <option value="France Bleu">France Bleu (variété française chaleureuse)</option>
      <option value="Skyrock">Skyrock (urban, rap, R'n'B)</option>
    </select>

    <label>Style Musical Principal</label>
    <select id="style"></select>

    <label>Ambiance / Mood</label>
    <select id="mood"></select>

    <label>Durée approximative</label>
    <input type="range" id="duration" min="2" max="4.5" value="3" step="0.5">
    <span id="durationValue">3 minutes</span>

    <label>Style des paroles / musique</label>
    <input type="text" id="lyricsStyle" placeholder="ex: à la manière de Jean-Jacques Goldman, poétique, simple...">

    <label>Paroles (optionnel)</label>
    <textarea id="lyrics" rows="5" placeholder="Colle tes paroles ici si tu en as..."></textarea>
    <input type="checkbox" id="autolyrics" checked> <label for="autolytics" style="display:inline;">Laisser l'IA écrire les paroles</label>

    <button class="generate-btn" onclick="generatePrompt()">GÉNÉRER LE PROMPT OPTIMISÉ</button>
    <button class="copy-btn" onclick="copyPrompt()">📋 Copier le Prompt</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    // Listes extraites et nettoyées du fichier
    const styles = ["pop","rock","rap","electronic","classical","folk","country","jazz","blues","hip-hop","latin","dance","singer-songwriter","pop rock","metal","r&b","soul","funk","new age","punk","indie pop","reggae","folk rock","gospel","techno","electro","psychedelic rock","ballad","lounge","romantic","french pop","art pop","chill","trap","house","synthpop","ambient","downtempo","progressive rock","melodic","dance pop","soft rock","electropop","chanson","melancholic","dream pop","indie","art rock","acoustic","electro house","indie folk","jazz fusion","neo-soul","soul jazz","power pop","lo-fi","contemporary","indie rock","post-rock","smooth jazz","synthwave","adult contemporary","chillwave","funk rock","progressive","emo","latin pop","bossa nova","samba","tango","flamenco","disco","post-punk","new wave","vaporwave","hyperpop","lo-fi hip hop","chillhop","phonk","retrowave","city pop","italo-disco"];

    const moods = ["joyeux et entraînant","très romantique et sensuel","mélancolique","émouvant","énergique","nostalgique","sombre","optimiste","sensuel et intime","uplifting","bittersweet","passionné","rêveur","festif","chill","épique","dramatique","légèrement rebelle"];

    // Remplissage des menus déroulants
    const styleSelect = document.getElementById('style');
    styles.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      styleSelect.appendChild(opt);
    });

    const moodSelect = document.getElementById('mood');
    moods.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      moodSelect.appendChild(opt);
    });

    document.getElementById('duration').addEventListener('input', function() {
      document.getElementById('durationValue').textContent = this.value + " minutes";
    });

    function generatePrompt() {
      const singer1 = document.getElementById('singer1').value.trim() || "un artiste";
      const singer2 = document.getElementById('singer2').value.trim();
      const radio = document.getElementById('radioTarget').value;
      const style = document.getElementById('style').value;
      const mood = document.getElementById('mood').value;
      const duration = document.getElementById('duration').value;
      const lyricsStyle = document.getElementById('lyricsStyle').value;
      const lyrics = document.getElementById('lyrics').value.trim();
      const autolyrics = document.getElementById('autolyrics').checked;

      let prompt = `Crée un vrai tube musical ultra-mémorisable, très fredonnable, avec un potentiel commercial énorme. `;

      if (radio) prompt += `Style adapté à ${radio}. `;
      prompt += `Style musical : ${style || "pop moderne"}. Ambiance : ${mood}. `;

      if (singer2) {
        prompt += `Interprété en duo par ${singer1} et ${singer2} uniquement (voix exclusives, très réalistes). `;
      } else {
        prompt += `Interprété uniquement par ${singer1} (voix exclusive, très réaliste). `;
      }

      prompt += `Tempo moyen, mélodie extrêmement catchy avec un refrain qui reste en tête dès la première écoute. `;

      if (lyricsStyle) prompt += `Paroles dans le style de ${lyricsStyle}. `;
      if (autolyrics) prompt += `Écris des paroles complètes, poétiques et impactantes. `;
      if (lyrics) prompt += `Utilise ces paroles comme base : ${lyrics}. `;

      prompt += `Structure claire avec intro, couplets, refrains puissants, pont et outro. Bonne dynamique, build-up, voix claires et émotions fortes. Production professionnelle radio, mix parfait, mastering puissant.`;

      document.getElementById('result').textContent = prompt;
    }

    function copyPrompt() {
      const text = document.getElementById('result').textContent;
      if (text) {
        navigator.clipboard.writeText(text).then(() => {
          alert("✅ Prompt copié ! Tu peux le coller directement dans l'IA musicale.");
        });
      } else {
        alert("Génère d'abord un prompt !");
      }
    }
  </script>
</body>
</html>
